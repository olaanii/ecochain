[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solidity compiler settings
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

# Gas reporting
gas_reports = ["StakingV2", "EcoVerifierV2"]
gas_reports_ignore = []

# Test settings
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 32 }

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 1000, depth = 128 }
