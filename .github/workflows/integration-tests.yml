name: Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/integration/**'
      - 'prisma/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/integration/**'
      - 'prisma/**'

jobs:
  integration-test:
    name: Testcontainers Integration Tests
    runs-on: ubuntu-latest
    
    services:
      docker:
        image: docker:24-dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Setup Docker
        uses: docker/setup-docker-action@v4

      - name: Verify Docker
        run: |
          docker version
          docker info

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Integration Tests
        run: pnpm run test:integration
        env:
          NODE_ENV: test
          # Testcontainers will use Docker automatically

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/integration/

  e2e-test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: integration-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Build Application
        run: pnpm run build
        env:
          NODE_ENV: production
          # Skip env validation for build
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy

      - name: Run E2E Tests
        run: pnpm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          # Use mock auth for tests
          TEST_TOKEN: test-token

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  load-test:
    name: k6 Load Tests (Smoke)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Start Application
        run: |
          pnpm run build
          pnpm start &
          npx wait-on http://localhost:3000/api/health --timeout 60000
        env:
          NODE_ENV: production
          DATABASE_URL: file:./test.db
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.50.0'

      - name: Run Smoke Test
        run: k6 run tests/load/smoke-test.js
        env:
          BASE_URL: http://localhost:3000

      - name: Run API Load Test (Short)
        run: k6 run --duration 30s --vus 10 tests/load/api-load.js
        env:
          BASE_URL: http://localhost:3000

      - name: Upload k6 Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: k6-results/
