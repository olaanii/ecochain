name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ecochain:ecochain@localhost:5432/ecochain
  # Force the Redis stub in CI — we don't provision Upstash for every PR.
  DISABLE_REDIS: "1"
  # Skip interwovenkit postinstall patch from touching network during CI.
  CI: "true"

jobs:
  web:
    name: Web app — lint, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ecochain
          POSTGRES_PASSWORD: ecochain
          POSTGRES_DB: ecochain
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecochain"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: false

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run prisma:generate

      - name: Apply Prisma schema
        run: pnpm run db:push

      - name: Lint / typecheck (verification + seed bundles)
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Integration tests (Jest)
        run: pnpm run test:integration

      - name: Build Next.js app
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Dummy public vars so `next build` doesn't fail on required env.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
