name: Contracts

permissions: {}

on:
  push:
    branches: ["main"]
    paths:
      - "contracts/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

env:
  FOUNDRY_PROFILE: ci

jobs:
  forge:
    name: Foundry — build, test, gas, coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Forge version
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Test (verbose)
        run: forge test -vvv

      - name: Gas snapshot (diff only; non-blocking)
        run: forge snapshot --check || echo "::warning::Gas snapshot drifted"
        continue-on-error: true

      - name: Coverage (summary only)
        run: forge coverage --report summary
        continue-on-error: true
