name: Test Observability & Reporting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # Daily at midnight

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-metrics:
    name: Test Metrics & Coverage Tracking
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run tests with JSON output
        run: forge test --json > test-results.json || true

      - name: Generate coverage report
        run: |
          forge coverage --report lcov
          genhtml -o coverage-report --branch-coverage --demangle-cpp lcov.info || true

      - name: Enforce coverage threshold (>= 95%)
        run: |
          # Extract coverage percentage from lcov
          LINE_COVERED=$(grep "LF:" lcov.info | cut -d: -f2 | awk '{sum+=$1} END {print sum}')
          LINE_HIT=$(grep "LH:" lcov.info | cut -d: -f2 | awk '{sum+=$1} END {print sum}')
          if [ -n "$LINE_COVERED" ] && [ -n "$LINE_HIT" ] && [ "$LINE_COVERED" -gt 0 ]; then
            COVERAGE=$(($LINE_HIT * 100 / $LINE_COVERED))
            echo "Line coverage: $COVERAGE%"
            if [ $COVERAGE -lt 95 ]; then
              echo "❌ Coverage $COVERAGE% is below threshold of 95%"
              exit 1
            fi
            echo "✅ Coverage meets threshold (>= 95%)"
          fi

      - name: Parse test metrics
        id: metrics
        run: |
          # Extract test counts from JSON output
          PASSED=$(grep -o '"status":"success"' test-results.json | wc -l)
          FAILED=$(grep -o '"status":"failure"' test-results.json | wc -l)
          SKIPPED=$(grep -o '"status":"skipped"' test-results.json | wc -l)
          TOTAL=$((PASSED + FAILED + SKIPPED))
          
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          
          # Calculate pass rate
          if [ $TOTAL -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
            echo "pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          else
            echo "pass_rate=0" >> $GITHUB_OUTPUT
          fi

      - name: Post test summary
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.metrics.outputs.passed }}';
            const failed = '${{ steps.metrics.outputs.failed }}';
            const skipped = '${{ steps.metrics.outputs.skipped }}';
            const total = '${{ steps.metrics.outputs.total }}';
            const passRate = '${{ steps.metrics.outputs.pass_rate }}';
            
            const summary = `## Test Results Summary
            
            | Metric | Value |
            |--------|-------|
            | **Total Tests** | ${total} |
            | **Passed** | ✅ ${passed} |
            | **Failed** | ${failed > 0 ? '❌' : '✅'} ${failed} |
            | **Skipped** | ⏭️ ${skipped} |
            | **Pass Rate** | ${passRate}% |
            `;
            
            core.summary.addRaw(summary).write();
            
            // Post PR comment if this is a PR
            if (context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./contracts/lcov.info
          flags: contracts
          name: contracts-coverage
          fail_ci_if_error: false

      - name: Archive test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            contracts/test-results.json
            contracts/coverage-report/
            contracts/lcov.info

  gas-tracking:
    name: Gas Usage Tracking
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Generate gas snapshot
        run: forge snapshot --snap gas-snapshot-new

      - name: Compare gas snapshots
        run: |
          if [ -f .gas-snapshot ]; then
            forge snapshot --diff .gas-snapshot --snap gas-snapshot-new > gas-diff.txt || true
            
            # Check for significant gas increases (>10%)
            INCREASES=$(grep -E '\+[0-9]+\s*\(' gas-diff.txt | grep -v '^-' || true)
            if [ -n "$INCREASES" ]; then
              echo "::warning::Gas usage increased significantly:"
              echo "$INCREASES"
            fi
          fi
          
          mv gas-snapshot-new .gas-snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: contracts/.gas-snapshot

  invariant-testing:
    name: Invariant & Fuzz Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run invariant tests (deep)
        run: |
          forge test --match-contract Invariant -vvv \
            --fuzz-runs 10000 \
            --depth 512 || echo "No invariant tests found"

      - name: Run fuzz tests (extended)
        run: |
          forge test --match-test testFuzz -vvv \
            --fuzz-runs 10000 || echo "No fuzz tests found"

      - name: Property-based testing report
        run: |
          echo "## Invariant Testing Results" >> $GITHUB_STEP_SUMMARY
          forge test --match-contract Invariant --json > invariant-results.json 2>/dev/null || true
          cat invariant-results.json | jq -r '.[] | select(.status) | "- \(testName): \(status)"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- No results available" >> $GITHUB_STEP_SUMMARY
