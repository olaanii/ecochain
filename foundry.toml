[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Solidity compiler
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuzz / invariant configuration (C-5)
[profile.default.fuzz]
runs   = 1000
seed   = "0xdeadbeef"

[profile.default.invariant]
runs   = 500
depth  = 256
fail_on_revert = true

# ── CI profile (faster, used in GitHub Actions) ───────────────────────────────
[profile.ci]
src     = "src"
out     = "out"
libs    = ["lib"]
optimizer = true
optimizer_runs = 200

[profile.ci.fuzz]
runs  = 5000

[profile.ci.invariant]
runs  = 500
depth = 256

# ── Initia EVM testnet (ecochain appchain) ────────────────────────────────────
# Usage: forge script ... --rpc-url initia_testnet
[rpc_endpoints]
initia_testnet = "${NEXT_PUBLIC_INITIA_JSON_RPC}"
localhost      = "http://localhost:8545"

# Etherscan-compatible explorer for verification
[etherscan]
initia_testnet = { key = "no-key-needed", url = "${NEXT_PUBLIC_INITIA_EXPLORER_URL}/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
